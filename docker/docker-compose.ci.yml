services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erreia
      POSTGRES_PASSWORD: erreia
      POSTGRES_DB: erreia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erreia"]
      interval: 2s
      timeout: 3s
      retries: 15

  ci:
    image: golang:1.25-bookworm
    # Share the Postgres network stack so 127.0.0.1:5432 reaches the DB,
    # matching GitHub Actions (postgres service at localhost). Keeps the
    # hardcoded integration-test DSNs working unchanged.
    network_mode: "service:postgres"
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /src
    environment:
      HOST_UID: ${HOST_UID:-0}
      HOST_GID: ${HOST_GID:-0}
      ERREIA_TEST_DATABASE_URL: postgres://erreia:erreia@127.0.0.1:5432/erreia?sslmode=disable
      GOFLAGS: -buildvcs=false
    volumes:
      - ../:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["bash", "docker/ci.sh"]

volumes:
  go-mod-cache:
  go-build-cache:
