<nav class="sidebar-nav">
  {% for group in site.data.doc_nav %}
  <div class="sidebar-group">
    <h5 class="sidebar-group-title">{{ group.group }}</h5>
    <ul>
      {% for item in group.pages %}
      <li>
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
  {% endfor %}
</nav>
