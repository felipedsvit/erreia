name: erreia-prod
version: '3.9'

# Production docker-compose.yaml
# Usage:
#   export GHCR_IMAGE=ghcr.io/felipedsvit/erreia:v1.0.0
#   docker-compose -f docker-compose.prod.yaml up -d
#
# Or use with `.env.prod`:
#   docker-compose --env-file .env.prod -f docker-compose.prod.yaml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-erreia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - erreia-net

  minio:
    image: minio/minio:RELEASE.2026-06-20T00-00-00Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - erreia-net

  createbuckets:
    image: minio/mc:RELEASE.2026-06-20T00-00-00Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-erreia} &&
      mc anonymous set download local/${MINIO_BUCKET:-erreia}/avatars || true
      "
    restart: "no"
    networks:
      - erreia-net

  app:
    image: ${GHCR_IMAGE}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      ERREIA_DATABASE_URL: ${ERREIA_DATABASE_URL}
      ERREIA_STORAGE_ENDPOINT: minio:9000
      ERREIA_STORAGE_PUBLIC_ENDPOINT: ${ERREIA_STORAGE_PUBLIC_ENDPOINT}
      ERREIA_STORAGE_ACCESS_KEY: ${ERREIA_STORAGE_ACCESS_KEY}
      ERREIA_STORAGE_SECRET_KEY: ${ERREIA_STORAGE_SECRET_KEY}
      ERREIA_STORAGE_USE_SSL: ${ERREIA_STORAGE_USE_SSL:-false}
      ERREIA_SESSION_COOKIE_SECURE: ${ERREIA_SESSION_COOKIE_SECURE:-true}
      ERREIA_ENV: prod
      ERREIA_BASE_URL: ${ERREIA_BASE_URL}
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M
    networks:
      - erreia-net

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local

networks:
  erreia-net:
    driver: bridge
